name: Smaller Android CI Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      HMAC_SECRET_KEY: ${{ secrets.HMAC_SECRET_KEY }}
      ENCRYPTION_KEY: ${{ secrets.HMAC_SECRET_KEY }}
      KEYSTORE_PASSWORD: "ottking_secure_pass_2026"
      KEY_ALIAS: "ottking_alias"
      KEY_PASSWORD: "ottking_secure_pass_2026"
      KEY_DN: "CN=oTtking, OU=Dev, O=oTtking, L=Dhaka, S=Dhaka, C=BD"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable', cache: true }

      - name: Setup Signing Key
        run: |
          mkdir -p signing
          if [ ! -f signing/key.jks ]; then
            keytool -genkeypair -v -keystore signing/key.jks -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" -alias "$KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000 -dname "$KEY_DN"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add -f signing/key.jks
            git commit -m "chore: save static signing key [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../signing/key.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (Optimized)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --strip-debug-info \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=HMAC_SECRET_KEY="$HMAC_SECRET_KEY" \
            --dart-define=ENCRYPTION_KEY="$ENCRYPTION_KEY"

      - name: Push to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: "v1.0.${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}